<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #7c6ff7;
      --accent2: #38bdf8;
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --border: #2e3248;
      --success: #34d399;
      --danger: #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
    h2 { font-size: 1rem; font-weight: 600; color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .header h1 { flex: 1; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; box-shadow: 0 0 6px var(--success); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card.tall { grid-row: span 2; }
    .card-header { display: flex; justify-content: space-between; align-items: center; }
    .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
    .badge {
      font-size: 0.72rem; padding: 2px 8px; border-radius: 999px;
      background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    }

    /* Clock */
    .clock-display { text-align: center; padding: 1rem 0; }
    .clock-time { font-size: 3.2rem; font-weight: 300; letter-spacing: -2px; color: var(--text); line-height: 1; }
    .clock-date { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }

    /* Todo */
    .todo-input-row { display: flex; gap: 0.5rem; }
    .todo-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.55rem 0.8rem; color: var(--text);
      font-size: 0.9rem; outline: none; transition: border-color 0.15s;
    }
    .todo-input:focus { border-color: var(--accent); }
    .btn {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 0.55rem 1rem; cursor: pointer; font-size: 0.9rem; font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn.sm:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .todo-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: 220px; overflow-y: auto; }
    .todo-item {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--surface2); border-radius: 8px; padding: 0.55rem 0.7rem;
      font-size: 0.88rem; transition: opacity 0.2s;
    }
    .todo-item.done { opacity: 0.45; text-decoration: line-through; }
    .todo-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    .todo-item span { flex: 1; }
    .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 1rem; }

    /* Counter */
    .counter-display { text-align: center; }
    .counter-num { font-size: 3.5rem; font-weight: 700; color: var(--accent); }
    .counter-btns { display: flex; gap: 0.5rem; justify-content: center; }
    .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn.outline:hover { background: var(--surface2); }
    .btn.large { padding: 0.6rem 1.5rem; font-size: 1.2rem; }

    /* Color mixer */
    .color-preview {
      height: 80px; border-radius: 10px; transition: background 0.3s;
      background: hsl(270, 70%, 60%);
    }
    .sliders { display: flex; flex-direction: column; gap: 0.6rem; }
    .slider-row { display: flex; align-items: center; gap: 0.8rem; font-size: 0.82rem; }
    .slider-row span { width: 24px; color: var(--muted); }
    input[type=range] {
      flex: 1; accent-color: var(--accent); cursor: pointer;
    }
    .slider-val { width: 32px; text-align: right; font-size: 0.8rem; color: var(--muted); }

    /* Notes */
    .note-area {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.8rem; color: var(--text); font-size: 0.88rem;
      resize: vertical; min-height: 120px; font-family: inherit; outline: none;
      transition: border-color 0.15s; line-height: 1.6;
    }
    .note-area:focus { border-color: var(--accent); }
    .note-status { font-size: 0.78rem; color: var(--muted); text-align: right; }

    /* Stats bar */
    .stat-bar { display: flex; gap: 1rem; }
    .stat { flex: 1; text-align: center; background: var(--surface2); border-radius: 10px; padding: 0.8rem; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent2); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* Mini chart */
    .chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
    .bar {
      flex: 1; background: var(--accent); border-radius: 4px 4px 0 0;
      opacity: 0.7; transition: height 0.4s ease, opacity 0.2s;
      cursor: pointer;
    }
    .bar:hover { opacity: 1; }

    scrollbar-width: thin;
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <h1><span class="dot"></span>Claude Demo App</h1>
  <span id="greeting" style="color:var(--muted);font-size:0.9rem;"></span>
</div>

<div class="grid">

  <!-- Clock -->
  <div class="card">
    <div class="card-header">
      <span class="label">Live Clock</span>
      <span class="badge" id="tz"></span>
    </div>
    <div class="clock-display">
      <div class="clock-time" id="clock-time">--:--:--</div>
      <div class="clock-date" id="clock-date"></div>
    </div>
  </div>

  <!-- Counter -->
  <div class="card">
    <div class="card-header">
      <span class="label">Counter 1</span>
      <button class="btn sm" onclick="resetCounter(1)">Reset</button>
    </div>
    <div class="counter-display">
      <div class="counter-num" id="counter-num-1">0</div>
    </div>
    <div class="counter-btns">
      <button class="btn outline large" onclick="adjustCounter(1, -1)">−</button>
      <button class="btn large" onclick="adjustCounter(1, 1)">+</button>
    </div>
  </div>

  <!-- Counter 2 -->
  <div class="card">
    <div class="card-header">
      <span class="label">Counter 2</span>
      <button class="btn sm" onclick="resetCounter(2)">Reset</button>
    </div>
    <div class="counter-display">
      <div class="counter-num" id="counter-num-2">0</div>
    </div>
    <div class="counter-btns">
      <button class="btn outline large" onclick="adjustCounter(2, -1)">−</button>
      <button class="btn large" onclick="adjustCounter(2, 1)">+</button>
    </div>
  </div>

  <!-- Counter 3 -->
  <div class="card">
    <div class="card-header">
      <span class="label">Counter 3</span>
      <button class="btn sm" onclick="resetCounter(3)">Reset</button>
    </div>
    <div class="counter-display">
      <div class="counter-num" id="counter-num-3">0</div>
    </div>
    <div class="counter-btns">
      <button class="btn outline large" onclick="adjustCounter(3, -1)">−</button>
      <button class="btn large" onclick="adjustCounter(3, 1)">+</button>
    </div>
  </div>

  <!-- Todo -->
  <div class="card tall">
    <div class="card-header">
      <span class="label">Todo List</span>
      <span class="badge" id="todo-count">0 left</span>
    </div>
    <div class="todo-input-row">
      <input class="todo-input" id="todo-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()" />
      <button class="btn" onclick="addTodo()">Add</button>
    </div>
    <div class="todo-list" id="todo-list">
      <div class="empty">No tasks yet — add one above!</div>
    </div>
    <div class="stat-bar" id="todo-stats" style="display:none">
      <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
      <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">Left</div></div>
    </div>
  </div>

  <!-- Color mixer -->
  <div class="card">
    <div class="card-header">
      <span class="label">Color Mixer</span>
      <span class="badge" id="hex-badge">#7c4fff</span>
    </div>
    <div class="color-preview" id="color-preview"></div>
    <div class="sliders">
      <div class="slider-row">
        <span>H</span>
        <input type="range" id="hue" min="0" max="360" value="270" oninput="updateColor()">
        <span class="slider-val" id="hue-val">270</span>
      </div>
      <div class="slider-row">
        <span>S</span>
        <input type="range" id="sat" min="0" max="100" value="70" oninput="updateColor()">
        <span class="slider-val" id="sat-val">70</span>
      </div>
      <div class="slider-row">
        <span>L</span>
        <input type="range" id="lit" min="10" max="90" value="60" oninput="updateColor()">
        <span class="slider-val" id="lit-val">60</span>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="card-header">
      <span class="label">Quick Note</span>
      <span class="note-status" id="note-status">Auto-saved</span>
    </div>
    <textarea class="note-area" id="note-area" placeholder="Type anything…"></textarea>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="card-header">
      <span class="label">Activity (click to randomize)</span>
    </div>
    <div class="chart" id="chart"></div>
    <div style="font-size:0.78rem;color:var(--muted);text-align:center">Click bars or press Randomize</div>
    <button class="btn outline" onclick="randomizeChart()">Randomize</button>
  </div>

</div>

<script>
  // Greeting
  const hr = new Date().getHours();
  document.getElementById('greeting').textContent =
    hr < 12 ? 'Good morning!' : hr < 17 ? 'Good afternoon!' : 'Good evening!';

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock-time').textContent =
      now.toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('clock-date').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    document.getElementById('tz').textContent =
      Intl.DateTimeFormat().resolvedOptions().timeZone;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Counters
  const counts = { 1: 0, 2: 0, 3: 0 };
  function adjustCounter(id, d) {
    counts[id] += d;
    const el = document.getElementById('counter-num-' + id);
    el.textContent = counts[id];
    el.style.color = counts[id] < 0 ? 'var(--danger)' : counts[id] > 0 ? 'var(--success)' : 'var(--accent)';
  }
  function resetCounter(id) { counts[id] = 0; adjustCounter(id, 0); }

  // Todo
  let todos = JSON.parse(localStorage.getItem('demo-todos') || '[]');
  function saveTodos() { localStorage.setItem('demo-todos', JSON.stringify(todos)); }
  function renderTodos() {
    const list = document.getElementById('todo-list');
    const left = todos.filter(t => !t.done).length;
    document.getElementById('todo-count').textContent = left + ' left';
    if (!todos.length) {
      list.innerHTML = '<div class="empty">No tasks yet — add one above!</div>';
      document.getElementById('todo-stats').style.display = 'none';
      return;
    }
    document.getElementById('todo-stats').style.display = 'flex';
    document.getElementById('s-total').textContent = todos.length;
    document.getElementById('s-done').textContent = todos.filter(t=>t.done).length;
    document.getElementById('s-left').textContent = left;
    list.innerHTML = todos.map((t, i) => `
      <div class="todo-item${t.done?' done':''}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})">
        <span>${t.text}</span>
        <button class="btn sm" onclick="removeTodo(${i})">✕</button>
      </div>`).join('');
  }
  function addTodo() {
    const inp = document.getElementById('todo-input');
    const text = inp.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    inp.value = '';
    saveTodos(); renderTodos();
  }
  function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
  function removeTodo(i) { todos.splice(i, 1); saveTodos(); renderTodos(); }
  renderTodos();

  // Color mixer
  function updateColor() {
    const h = document.getElementById('hue').value;
    const s = document.getElementById('sat').value;
    const l = document.getElementById('lit').value;
    document.getElementById('hue-val').textContent = h;
    document.getElementById('sat-val').textContent = s;
    document.getElementById('lit-val').textContent = l;
    const hsl = `hsl(${h},${s}%,${l}%)`;
    document.getElementById('color-preview').style.background = hsl;
    // convert to hex approx
    const c = document.createElement('canvas').getContext('2d');
    c.fillStyle = hsl;
    c.fillRect(0,0,1,1);
    const [r,g,b] = c.getImageData(0,0,1,1).data;
    document.getElementById('hex-badge').textContent =
      '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  updateColor();

  // Notes
  const noteArea = document.getElementById('note-area');
  noteArea.value = localStorage.getItem('demo-note') || '';
  let saveTimer;
  noteArea.addEventListener('input', () => {
    document.getElementById('note-status').textContent = 'Saving…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem('demo-note', noteArea.value);
      document.getElementById('note-status').textContent = 'Saved ✓';
    }, 600);
  });

  // Chart
  let chartData = Array.from({length: 12}, () => Math.floor(Math.random()*80)+10);
  function renderChart() {
    const max = Math.max(...chartData);
    document.getElementById('chart').innerHTML = chartData.map((v, i) => `
      <div class="bar" style="height:${(v/max)*100}%" title="${v}" onclick="chartData[${i}]=Math.floor(Math.random()*80)+10;renderChart()"></div>
    `).join('');
  }
  function randomizeChart() {
    chartData = Array.from({length: 12}, () => Math.floor(Math.random()*80)+10);
    renderChart();
  }
  renderChart();
</script>
</body>
</html>
